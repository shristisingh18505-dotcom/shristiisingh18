{% extends 'base.html' %}
{% block content %}
<div class="card p-4">
  <h5>Grades</h5>
  <div class="alert alert-secondary small">
    Hint: Use <code>enrollment_id|assessment|score</code> per line.
  </div>
  <form method="post">
    {{ form.hidden_tag() }}
    <div class="row"><div class="col-md-3 mb-3">{{ form.course_id.label }} {{ form.course_id(class="form-control") }}</div></div>
    <div class="mb-3">{{ form.lines.label }} {{ form.lines(class="form-control", rows=6) }}</div>
    <button class="btn btn-primary">Save Grades</button>
  </form>
</div>
{% endblock %}
