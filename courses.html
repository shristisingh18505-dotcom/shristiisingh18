<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EduTrack (No-Auth)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background:#f5f7fb; }
      .card { border:0; border-radius:1rem; box-shadow:0 10px 25px rgba(0,0,0,.06); }
      .navbar-brand { font-weight:700; letter-spacing:.3px; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">🏫 EduTrack</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.students') }}">Students</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.teachers') }}">Teachers</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.courses') }}">Courses</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.enroll') }}">Enroll</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.attendance') }}">Attendance</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.grades') }}">Grades</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.report') }}">Report Card</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container my-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat,msg in messages %}
            <div class="alert alert-{{cat}}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
